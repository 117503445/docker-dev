version: '3'

tasks:
  default:
    desc: "The default task" 
    cmds:
      - task: build-dev
      
  build-dev:
    desc: "Build the dev image in China Mainland"
    cmds:
      - docker build -t 117503445/dev -f ./images/dev/Dockerfile --build-arg CHINA_MIRROR=1 .
      - docker run -it --rm -p 44444:4444 117503445/dev

  build-dev-desktop:
    desc: "Build the dev-desktop image in China Mainland"
    cmds:
      - docker build -t 117503445/dev-desktop -f ./images/dev-desktop/Dockerfile --build-arg CHINA_MIRROR=1 .
      - docker run --rm -p 44444:4444 -p 3000:3000 117503445/dev-desktop
  
  run-dev-desktop:
    desc: "Run the dev-desktop image"
    cmds:
      - docker run -it --rm -p 44444:4444 -p 3000:3000 --entrypoint zsh 117503445/dev-desktop
  
  run-webtop:
    desc: "Run the webtop image"
    cmds:
      - docker run --rm -p 3000:3000 lscr.io/linuxserver/webtop:arch-kde
